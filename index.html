<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inventory"/>
<meta name="theme-color" content="#FF6B00"/>
<title>Inventory</title>
<script>
const manifestData = {
  name: "Inventory Tracker",
  short_name: "Inventory",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#FF6B00",
  orientation: "portrait",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23FF6B00'/><path d='M56 60h80v12H56zm0 20h80v12H56zm0 20h50v12H56z' fill='white'/><circle cx='138' cy='138' r='30' fill='%2322c55e'/><path d='M126 138l8 8 16-16' stroke='white' stroke-width='4' fill='none' stroke-linecap='round'/></svg>`),
    sizes: "192x192", type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/manifest+json'});
document.write('<link rel="manifest" href="' + URL.createObjectURL(blob) + '"/>');
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
:root{
  --orange:#FF6B00;--orange-light:#FFF3E8;--orange-dark:#E05A00;--orange-mid:#FF8C33;
  --green:#16a34a;--green-light:#f0fdf4;--green-dark:#15803d;
  --red:#dc2626;--red-light:#fef2f2;
  --blue:#0ea5e9;--blue-light:#f0f9ff;
  --gray-50:#fafafa;--gray-100:#f4f4f5;--gray-200:#e4e4e7;
  --gray-400:#a1a1aa;--gray-600:#52525b;--gray-900:#18181b;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,20px);
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --nav-height:68px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-orange:0 6px 20px rgba(255,107,0,.35);
}
html,body{
  height:100%;
  background:#f0f0f3;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  color:var(--gray-900);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation;
}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;position:relative;background:#f0f0f3;overflow:hidden}

/* ── HEADER ── */
#header{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:calc(var(--safe-top) + 10px) 20px 0;
  border-bottom:1px solid rgba(0,0,0,.06);
  flex-shrink:0;z-index:10;
}
#header .date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#header .date-txt{font-size:12px;font-weight:700;color:var(--orange);letter-spacing:.3px}
#header .item-count{font-size:11px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:4px}
#header .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#header h1{font-size:26px;font-weight:900;letter-spacing:-0.8px;margin-bottom:14px;color:var(--gray-900)}

/* ── TAB PILLS ── */
#tab-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
#tab-pills::-webkit-scrollbar{display:none}
.tab-pill{flex-shrink:0;padding:7px 15px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;background:var(--gray-100);color:var(--gray-600)}
.tab-pill.active{background:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(255,107,0,.3)}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 0;-webkit-overflow-scrolling:touch;position:relative;padding-bottom:calc(var(--nav-height) + var(--safe-bot) + 16px)}
#content{transition:opacity .15s ease}
#content.fading{opacity:0}

/* ── BOTTOM NAV ── */
#bottom-nav{
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.06);
  display:flex;
  padding:8px 0 calc(var(--safe-bot));
  flex-shrink:0;z-index:10;
  position:relative;
  height:calc(var(--nav-height) + var(--safe-bot));
  box-shadow:0 -4px 20px rgba(0,0,0,.05);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit;transition:transform .15s}
.nav-btn:active{transform:scale(.88)}
.nav-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn.active .nav-icon{background:var(--orange-light)}
.nav-btn.active svg{stroke:var(--orange)}
.nav-btn svg{stroke:var(--gray-400);transition:stroke .2s}
.nav-label{font-size:10px;font-weight:700;color:var(--gray-400);transition:color .2s}
.nav-btn.active .nav-label{color:var(--orange)}

/* ── FAB ── */
#fab-wrap{
  flex:0 0 80px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
#fab{
  width:54px;height:54px;
  background:linear-gradient(145deg,var(--orange-mid),var(--orange-dark));
  border-radius:18px;
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(255,107,0,.45), 0 2px 8px rgba(255,107,0,.25), inset 0 1px 0 rgba(255,255,255,.2);
  z-index:20;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  margin-bottom:4px;
  position:relative;overflow:hidden;
}
#fab:active{transform:scale(.88);box-shadow:0 3px 10px rgba(255,107,0,.3)}
#fab svg{stroke:#fff;width:24px;height:24px;flex-shrink:0;transition:transform .2s}
#fab:active svg{transform:rotate(45deg)}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.card-title{font-size:11px;font-weight:800;color:var(--gray-400);letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase}

/* ── INPUTS ── */
input{width:100%;padding:13px 14px;border:1.5px solid var(--gray-200);border-radius:13px;font-size:15px;background:var(--gray-50);color:var(--gray-900);outline:none;font-family:inherit;transition:all .2s;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--orange);background:#fff;box-shadow:0 0 0 4px rgba(255,107,0,.08)}
label{font-size:12px;font-weight:700;color:var(--gray-600);display:block;margin-bottom:6px;letter-spacing:.3px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;-webkit-appearance:none;appearance:none;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(145deg,var(--orange-mid),var(--orange));color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.3)}
.btn-primary:active{background:var(--orange-dark);box-shadow:none}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-danger:active{background:#fecaca}
.btn-ghost{background:var(--gray-100);color:var(--gray-600)}
.btn-ghost:active{background:var(--gray-200)}
.btn-green{background:var(--green-light);color:var(--green)}
.btn-green:hover{background:#dcfce7}
.btn-green:active{background:#bbf7d0}
.btn-save{background:linear-gradient(145deg,#22c55e,var(--green));color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.3)}
.btn-save:active{background:#166534;box-shadow:none}
.btn-full{width:100%}

/* ── CODE INPUT ── */
#code-field-wrap{position:relative}
#code-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:900;color:var(--orange);pointer-events:none;z-index:2;line-height:1}
#code-input{padding-left:32px;font-size:20px;font-weight:900;letter-spacing:1.5px;color:var(--orange);font-variant-numeric:tabular-nums}

/* ── QTY CONTROLS ── */
.qty-row{display:flex;align-items:center;gap:0;background:var(--gray-100);border-radius:16px;overflow:hidden}
.qty-btn{width:60px;height:60px;border:none;background:none;font-size:28px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-900);flex-shrink:0;transition:background .12s;-webkit-tap-highlight-color:transparent}
.qty-btn:active{background:var(--gray-200)}
.qty-val{flex:1;text-align:center;font-size:32px;font-weight:900;color:var(--gray-900);transition:transform .15s}

/* ── ITEM ROW ── */
.item-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--gray-100)}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.badge{background:var(--orange-light);color:var(--orange);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;font-family:monospace;letter-spacing:.5px;flex-shrink:0}
.price{font-size:15px;font-weight:800;color:var(--orange);flex-shrink:0}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--gray-400);fill:none;pointer-events:none}
.search-wrap input{padding-left:38px}

/* ── DROPDOWN ── */
#dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.18);z-index:200;max-height:280px;overflow-y:auto;margin-top:6px;border:1.5px solid var(--gray-200);display:none}
#dropdown.open{display:block}
.dd-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background .12s}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:var(--orange-light)}
.dd-name{font-size:14px;font-weight:700;color:var(--gray-900)}

/* ── SELECTED PANEL ── */
.selected-card{background:linear-gradient(135deg,#FF6B00,#FF9A40);border-radius:var(--radius);padding:18px;color:#fff;margin-bottom:14px;animation:slideIn .25s cubic-bezier(.34,1.3,.64,1);box-shadow:0 8px 24px rgba(255,107,0,.35)}
@keyframes slideIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.sel-label{font-size:11px;font-weight:700;opacity:.75;margin-bottom:4px;letter-spacing:.5px}
.sel-name{font-size:21px;font-weight:900;margin-bottom:8px}
.sel-row{display:flex;justify-content:space-between;align-items:center}
.sel-price{font-size:15px;opacity:.9}
.sel-code{background:rgba(255,255,255,.25);border-radius:10px;padding:3px 10px;font-size:12px;font-weight:800;font-family:monospace;backdrop-filter:blur(4px)}

/* ── TOTAL BAR ── */
.total-bar{background:var(--gray-50);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border:1.5px solid var(--gray-100)}
.total-label{font-size:14px;color:var(--gray-600);font-weight:600}
.total-val{font-size:28px;font-weight:900;color:var(--orange)}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.stat-card.wide{grid-column:1/-1}
.stat-label{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:900}

/* ── BAR CHART ── */
.bar-row{margin-bottom:12px}
.bar-label-row{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-label{font-size:12px;color:var(--gray-600);font-weight:600}
.bar-amount{font-size:12px;font-weight:800;color:var(--gray-900)}
.bar-track{height:9px;background:var(--gray-100);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--orange),var(--orange-mid));transition:width .7s cubic-bezier(.25,.46,.45,.94)}

/* ── FILTER PILLS ── */
.filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:7px 14px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--gray-100);color:var(--gray-600);transition:all .15s}
.filter-pill:active{transform:scale(.95)}
.filter-pill.active{background:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(255,107,0,.25)}

/* ── DATE GROUP HEADER ── */
.date-group-header{
  font-size:12px;font-weight:800;color:var(--gray-600);
  letter-spacing:.5px;text-transform:uppercase;
  padding:12px 16px 8px;
  background:var(--gray-50);
  border-radius:12px 12px 0 0;
  border-bottom:1px solid var(--gray-100);
  display:flex;justify-content:space-between;align-items:center;
}
.date-group-total{font-size:13px;font-weight:800;color:var(--orange)}

/* ── PURCHASE ROW ── */
.purch-row{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--gray-100)}
.purch-row:last-child{border-bottom:none}
.purch-left{flex:1;min-width:0}
.purch-name{font-size:14px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.purch-sub{font-size:12px;color:var(--gray-400);margin-top:2px}
.purch-right{text-align:right;flex-shrink:0}
.purch-total{font-size:15px;font-weight:800;color:var(--orange)}
.purch-qty{font-size:11px;color:var(--gray-400)}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end}
#modal-overlay.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45);animation:fadeBg .2s ease;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.modal-sheet{position:relative;width:100%;background:#fff;border-radius:28px 28px 0 0;padding:24px 20px calc(var(--safe-bot) + 20px);max-height:90vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:20px;letter-spacing:-.3px}
.field{margin-bottom:14px}

/* ── PURCHASE SUCCESS DIALOG ── */
#purchase-dialog{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#purchase-dialog.open{display:flex}
.pd-bg{
  position:absolute;inset:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:fadeBg .25s ease;
}
.pd-card{
  position:relative;
  background:#fff;
  border-radius:28px;
  padding:28px 24px 24px;
  width:100%;max-width:360px;
  box-shadow:0 24px 60px rgba(0,0,0,.22);
  animation:popIn .3s cubic-bezier(.34,1.4,.64,1);
  z-index:1;
}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pd-success-icon{
  width:64px;height:64px;
  background:linear-gradient(145deg,#22c55e,var(--green));
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  box-shadow:0 8px 20px rgba(22,163,74,.3);
  animation:bounceIn .5s cubic-bezier(.34,1.5,.64,1) .1s both;
}
@keyframes bounceIn{from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0)}}
.pd-title{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.pd-subtitle{font-size:13px;color:var(--gray-400);text-align:center;font-weight:600;margin-bottom:20px}
.pd-details-card{
  background:var(--gray-50);
  border-radius:16px;
  padding:16px;
  border:1.5px solid var(--gray-100);
  margin-bottom:20px;
}
.pd-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-100)}
.pd-row:last-child{border-bottom:none;padding-bottom:0}
.pd-row-label{font-size:13px;color:var(--gray-400);font-weight:600}
.pd-row-value{font-size:14px;font-weight:700;color:var(--gray-900)}
.pd-row-value.bold{font-weight:900;color:var(--gray-900)}
.pd-row-value.code{font-family:monospace;font-weight:900;color:var(--orange);background:var(--orange-light);padding:2px 8px;border-radius:8px;font-size:13px}
.pd-row-value.qty{font-weight:900;color:var(--green);font-size:16px}
.pd-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:2px solid var(--gray-200);margin-top:4px}
.pd-total-label{font-size:14px;font-weight:700;color:var(--gray-600)}
.pd-total-val{font-size:24px;font-weight:900;color:var(--orange)}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:calc(var(--safe-bot) + var(--nav-height) + 16px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;color:#fff;
  padding:12px 24px;border-radius:24px;
  font-size:14px;font-weight:700;
  z-index:900;opacity:0;
  transition:all .3s cubic-bezier(.34,1.3,.64,1);white-space:nowrap;pointer-events:none;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-success{background:var(--green)}
#toast.toast-delete{background:var(--red)}
#toast.toast-save{background:var(--green)}

/* ── CHIPS (Frequently Used) ── */
.freq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:0}
.chip{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:14px;padding:11px 12px;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.chip:active{border-color:var(--orange);background:var(--orange-light);transform:scale(.96)}
.chip-code{font-size:10px;font-weight:700;color:var(--gray-400);margin-bottom:2px;font-family:monospace}
.chip-name{font-size:13px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-price{font-size:12px;color:var(--orange);margin-top:3px;font-weight:800}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:15px}

/* ── ICON BUTTONS ── */
.icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.icon-btn:active{transform:scale(.88)}
.icon-btn svg{width:16px;height:16px;fill:none}
.icon-btn-blue{background:#eff6ff}
.icon-btn-blue svg{stroke:#3b82f6}
.icon-btn-red{background:var(--red-light)}
.icon-btn-red svg{stroke:var(--red)}

/* ── RANK ROWS ── */
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.rank-row:last-child{border-bottom:none}
.rank-num{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}

/* ── RIPPLE ── */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);pointer-events:none;animation:ripple .4s ease-out forwards}
@keyframes ripple{from{transform:scale(0);opacity:1}to{transform:scale(2.5);opacity:0}}

/* ── ANALYTICS DATE PICKER ── */
.analytics-date-section{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.date-picker-row{display:flex;gap:10px;margin-bottom:12px}
.date-picker-row input[type="date"]{

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ac = null;
function getAC(){
  if(!_ac){try{_ac = new AudioCtx();}catch(e){}}
  return _ac;
}
function playTone(freq, dur, type='sine', gain=0.18){
  const ac = getAC(); if(!ac) return;
  try{
    if(ac.state==='suspended') ac.resume();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ac.currentTime);
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + dur);
  }catch(e){}
}
function playMultiTone(notes, type='sine', gain=0.15){
  const ac = getAC(); if(!ac) return;
  try{
    if(ac.state==='suspended') ac.resume();
    notes.forEach(([freq,start,dur])=>{
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, ac.currentTime + start);
      g.gain.setValueAtTime(gain, ac.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + dur);
      o.start(ac.currentTime + start);
      o.stop(ac.currentTime + start + dur + 0.05);
    });
  }catch(e){}
}

// ═══════════════════════════════════
//  RIPPLE EFFECT
// ═══════════════════════════════════
function addRipple(el, e){
  if(!el||!e) return;
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(el.offsetWidth, el.offsetHeight);
  r.style.cssText = `width:${size}px;height:${size}px;top:${(e.offsetY||0) - size/2}px;left:${(e.offsetX||0) - size/2}px`;
  el.appendChild(r);
  setTimeout(()=>r.remove(), 500);
}

function switchTab(tab, preItem=null){
  SFX.nav();
  const content = document.getElementById('content');
  content.classList.add('fading');
  setTimeout(()=>{
    currentTab = tab;
    if(preItem){purchaseState.selectedItem=preItem;purchaseState.qty=1;purchaseState.codeStr=preItem.code;purchaseState.searchStr=preItem.name;}
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
    document.getElementById('screen-title').textContent = TABS[tab].title;
    updateItemCount();
    renderContent();
    content.classList.remove('fading');
  }, 100);
}

function groupPurchasesByDate(list){
  const groups = {};
  list.forEach(p=>{
    const dk = dateKey(p.ts);
    if(!groups[dk]) groups[dk] = {label:'', purchases:[], total:0, ts:p.ts};
    groups[dk].purchases.push(p);
    groups[dk].total += p.total;
  });
  // Sort groups newest first
  return Object.values(groups).sort((a,b)=>b.ts-a.ts);
}

function fmtGroupLabel(dateStr){
  const d = new Date(dateStr);
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if(d.toDateString()===today) return 'Today';
  if(d.toDateString()===yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function renderHome(){
  const today = new Date().toDateString();
  const tm = monthKey(Date.now());
  const todaySpend = purchases.filter(p=>new Date(p.ts).toDateString()===today).reduce((s,p)=>s+p.total,0);
  const monthSpend = purchases.filter(p=>monthKey(p.ts)===tm).reduce((s,p)=>s+p.total,0);
  const recentList = [...purchases].sort((a,b)=>b.ts-a.ts).slice(0,10);
  const top = [...items].sort((a,b)=>(b.usage||0)-(a.usage||0)).slice(0,8);

  const chipsHtml = top.map(item=>`
    <button class="chip" onclick="quickSelect('${item.id}')">
      <div class="chip-code">${item.code}</div>
      <div class="chip-name">${item.name.length>16?item.name.slice(0,16)+'…':item.name}</div>
      <div class="chip-price">${fmtCurrency(item.price)}</div>
    </button>`).join('');

  // Group recent by date
  const groups = groupPurchasesByDate(recentList);
  let groupedHtml = '';
  if(groups.length===0){
    groupedHtml = '<div class="card"><div class="empty">'+svg(ICONS.history,40)+'<br>No purchases yet</div></div>';
  } else {
    groupedHtml = groups.map(g=>`
      <div class="date-group">
        <div class="date-group-header">
          <span>${fmtGroupLabel(g.purchases[0].ts)}</span>
          <span class="date-group-total">${fmtCurrency(g.total)}</span>
        </div>
        <div class="card" style="padding:0 16px;border-radius:0 0 ${g===groups[groups.length-1]?'var(--radius) var(--radius)':'0 0'}">
          ${g.purchases.map(p=>`

              <div class="purch-left">
                <div class="purch-name">${p.itemName}</div>
                <div class="purch-sub">${fmtTime(p.ts)} · <span class="badge" style="font-size:10px">${p.code}</span></div>
              </div>
              <div class="purch-right">
                <div class="purch-total">${fmtCurrency(p.total)}</div>
                <div class="purch-qty">×${p.qty}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  return `
  <div class="stat-grid">
    <div class="stat-card" style="background:linear-gradient(135deg,var(--orange),var(--orange-mid));color:#fff;box-shadow:var(--shadow-orange)">
      <div class="stat-label" style="color:rgba(255,255,255,.75)">TODAY</div>
      <div class="stat-val">${fmtCurrency(todaySpend)}</div>
    </div>
    <div class="stat-card" style="background:linear-gradient(135deg,var(--green),#22c55e);color:#fff;box-shadow:0 6px 20px rgba(22,163,74,.25)">

      <div class="stat-val">${fmtCurrency(monthSpend)}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <button class="btn btn-primary" onclick="onFabClick()" style="padding:14px 12px;font-size:14px">
      ${svg(ICONS.cart,18)} New Purchase
    </button>
    <button class="btn btn-green" onclick="switchTab('items')" style="padding:14px 12px;font-size:14px">
      ${svg(ICONS.pkg,18)} Items
    </button>
  </div>

  <div class="card">
    <div class="card-title">${svg(ICONS.star,15,'style="stroke:#f59e0b"')} FREQUENTLY USED</div>
    <div class="freq-grid">

  if(!item) return;
  SFX.select();
  purchaseState = {selectedItem:item, qty:1, codeStr:item.code, searchStr:item.name, ddOpen:false};
  switchTab('purchase');
}

// ═══════════════════════════════════
//  PURCHASE
// ═══════════════════════════════════
function renderPurchase(){
  const s = purchaseState;
  const selHtml = s.selectedItem ? `
    <div class="selected-card">
      <div class="sel-label">SELECTED ITEM</div>
      <div class="sel-name">${s.selectedItem.name}</div>
      <div class="sel-row">
        <div class="sel-price">Unit: ${fmtCurrency(s.selectedItem.price)}</div>
        <div class="sel-code">${s.selectedItem.code}</div>
      </div>
    </div>
    <div class="qty-row" style="margin-bottom:14px">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-val" id="qty-display">${s.qty}</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="total-bar">
      <span class="total-label">Total</span>
      <span class="total-val" id="total-display">${fmtCurrency(s.selectedItem.price * s.qty)}</span>
    </div>
    <button class="btn btn-save btn-full" onclick="savePurchase()" style="padding:16px;font-size:16px">
      ${svg(ICONS.check,18)} Save Purchase
    </button>
  ` : '';

  const codeNum = s.codeStr.replace(/^\+/,'');
  const codeErr = s.codeStr && !s.selectedItem
    ? `<div style="color:var(--red);font-size:12px;font-weight:700;margin-top:6px">Code not found — try another number</div>`
    : '';

  const q = s.searchStr.toLowerCase();
  const filtered = q
    ? items.filter(i=>i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)).slice(0,12)
    : items.slice(0,12);
  const ddItems = filtered.map(i=>`
    <div class="dd-item" onclick="selectItemFromDD('${i.id}')">
      <div><div class="dd-name">${i.name}</div><span class="badge">${i.code}</span></div>
      <div class="price">${fmtCurrency(i.price)}</div>
    </div>`).join('');

  return `
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">${svg(ICONS.flash,15,'style="stroke:#f59e0b"')} QUICK CODE ENTRY</div>
    <div id="code-field-wrap">
      <span id="code-prefix">+</span>
      <input id="code-input" type="tel" inputmode="numeric" pattern="[0-9]*"
        placeholder="102" value="${codeNum}" autocomplete="off"
        oninput="onCodeInput(this.value)" onfocus="this.select()"/>
    </div>
    ${codeErr}
  </div>

  <div class="card" style="margin-bottom:14px;position:relative">
    <div class="card-title">${svg(ICONS.search,15,'style="stroke:var(--orange)"')} SEARCH BY NAME</div>
    <div style="position:relative">
      <input id="name-search" type="text" placeholder="Search item name…"
        value="${s.searchStr}" oninput="onNameSearch(this.value)"
        onfocus="openDD()" autocomplete="off"/>
      <div id="dropdown" class="${s.ddOpen?'open':''}">
        ${ddItems||'<div style="padding:14px;color:var(--gray-400);font-size:14px;text-align:center">No items found</div>'}
      </div>
    </div>
  </div>

  ${selHtml}
  <div style="height:8px"></div>`;
}

function attachPurchaseEvents(){
  document.addEventListener('click', handleDDOutside, {once:false});
}

function handleDDOutside(e){
  if(currentTab!=='purchase') return;
  const dd = document.getElementById('dropdown');
  const ns = document.getElementById('name-search');
  if(dd && ns && !dd.contains(e.target) && e.target!==ns){
    dd.classList.remove('open');
    purchaseState.ddOpen = false;
  }
}

function onCodeInput(val){
  const num = val.replace(/\D/g,'');
  const code = num ? '+'+num : '';
  purchaseState.codeStr = code;
  const found = code ? items.find(i=>i.code===code) : null;
  purchaseState.selectedItem = found||null;
  if(found){
    purchaseState.qty=1;
    purchaseState.searchStr=found.name;
    SFX.select();
  }
  document.getElementById('code-input').value = num;
  const errDiv = document.querySelector('#code-field-wrap + div');
  if(errDiv && errDiv.style){
    if(num && !found) errDiv.style.display='';
    else if(errDiv) errDiv.style.display='none';
  }
  if(found){
    renderContent();
    setTimeout(()=>{
      const ci = document.getElementById('code-input');
      if(ci){ci.focus(); const l=ci.value.length; ci.setSelectionRange(l,l);}
    },50);
  }
}

function onNameSearch(val){
  purchaseState.searchStr = val;
  purchaseState.ddOpen = true;
  const q = val.toLowerCase();
  const filtered = q
    ? items.filter(i=>i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)).slice(0,12)
    : items.slice(0,12);
  const dd = document.getElementById('dropdown');
  if(!dd) return;
  dd.innerHTML = filtered.length
    ? filtered.map(i=>`<div class="dd-item" onclick="selectItemFromDD('${i.id}')"><div><div class="dd-name">${i.name}</div><span class="badge">${i.code}</span></div><div class="price">${fmtCurrency(i.price)}</div></div>`).join('')
    : '<div style="padding:14px;color:var(--gray-400);font-size:14px;text-align:center">No items found</div>';
  dd.classList.add('open');
}

function openDD(){
  purchaseState.ddOpen = true;
  const dd = document.getElementById('dropdown');
  if(dd) dd.classList.add('open');
}

function selectItemFromDD(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  SFX.select();
  purchaseState.selectedItem = item;
  purchaseState.qty = 1;
  purchaseState.codeStr = item.code;
  purchaseState.searchStr = item.name;
  purchaseState.ddOpen = false;
  renderContent();
}

function changeQty(delta){
  const newQty = Math.max(1, purchaseState.qty + delta);
  purchaseState.qty = newQty;
  if(delta > 0) SFX.qtyUp();
  else SFX.qtyDown();
  const qd = document.getElementById('qty-display');
  const td = document.getElementById('total-display');
  if(qd) qd.textContent = purchaseState.qty;
  if(td && purchaseState.selectedItem) td.textContent = fmtCurrency(purchaseState.selectedItem.price * purchaseState.qty);
  if(qd){qd.style.transform='scale(1.25)';setTimeout(()=>qd.style.transform='',150);}
}

function savePurchase(){
  const {selectedItem, qty} = purchaseState;
  if(!selectedItem) return;
  SFX.save();
  const record = {id:uid(), ts:Date.now(), itemId:selectedItem.id, itemName:selectedItem.name, code:selectedItem.code, price:selectedItem.price, qty, total:selectedItem.price*qty};
  purchases.unshift(record);
  savePurchases();
  const idx = items.findIndex(i=>i.id===selectedItem.id);
  if(idx>=0){items[idx].usage=(items[idx].usage||0)+1; items[idx].lastUsed=Date.now(); saveItems();}
  purchaseState = {selectedItem:null, qty:1, codeStr:'', searchStr:'', ddOpen:false};
  // Navigate home first, then show dialog
  switchTab('home');
  setTimeout(()=>showPurchaseDialog(record), 200);
}

    <div class="pd-row">
      <span class="pd-row-label">Item</span>
      <span class="pd-row-value">${record.itemName}</span>
    </div>
    <div class="pd-row">

    <div class="pd-row">
      <span class="pd-row-label">Date</span>
      <span class="pd-row-value" style="font-size:12px">${dateStr}<br><span style="color:var(--gray-400)">${timeStr}</span></span>
    </div>
    <div class="pd-row">
      <span class="pd-row-label">Code</span>
      <span class="pd-row-value code bold">${record.code}</span>

function closePurchaseDialog(){
  document.getElementById('purchase-dialog').classList.remove('open');
}

//  ITEMS
// ═══════════════════════════════════
let itemSearch = '';
function renderItems(){
  const q = itemSearch.toLowerCase();
  const filtered = q
    ? items.filter(i=>i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q))
    : items;
  const rows = filtered.map(item=>`
    <div class="item-row">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          <span class="badge">${item.code}</span>
          <span class="price">${fmtCurrency(item.price)}</span>
        </div>
      </div>
      <button class="icon-btn icon-btn-blue" onclick="editItem('${item.id}')">${svg(ICONS.edit,16)}</button>
      <button class="icon-btn icon-btn-red" onclick="deleteItem('${item.id}')" style="margin-left:6px">${svg(ICONS.trash,16)}</button>
    </div>`).join('');

  return `
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <div class="search-wrap" style="flex:1;margin-bottom:0">
      ${svg(ICONS.search)}<input type="search" id="item-search" value="${itemSearch}" placeholder="Search items…" oninput="onItemSearch(this.value)" autocomplete="off"/>
    </div>
    <button class="btn btn-primary" onclick="showAddItem()" style="padding:12px 16px;flex-shrink:0">
      ${svg(ICONS.plus,16)} Add
    </button>
  </div>
  <div style="font-size:12px;color:var(--gray-400);font-weight:700;margin-bottom:10px">${filtered.length} of ${items.length} items</div>
  <div class="card" style="padding:0 16px">
    ${rows||'<div class="empty">No items found</div>'}
  </div>
  <div style="height:8px"></div>`;
}

function attachItemEvents(){}
function onItemSearch(val){itemSearch=val;renderContent();}

function showAddItem(editId=null){
  const item = editId ? items.find(i=>i.id===editId) : null;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${item?'Edit Item':'Add New Item'}</div>
    <div class="field"><label>ITEM NAME</label><input id="m-name" type="text" value="${item?item.name:''}" placeholder="e.g. Rice 5kg" autocomplete="off"/></div>
    <div class="field"><label>PRICE (¥)</label><input id="m-price" type="number" inputmode="decimal" value="${item?item.price:''}" placeholder="e.g. 850"/></div>
    <div class="field"><label>UNIQUE CODE</label><input id="m-code" type="text" value="${item?item.code:''}" placeholder="e.g. +102" style="font-family:monospace;font-weight:700" autocomplete="off"/></div>
    <div id="m-err" style="color:var(--red);font-size:13px;font-weight:700;min-height:20px;margin-bottom:8px"></div>
    <button class="btn btn-save btn-full" onclick="saveItem('${editId||''}')" style="padding:15px">
      ${svg(item?ICONS.check:ICONS.plus,18)} ${item?'Save Changes':'Add Item'}
    </button>`;
  openModal();
}
function editItem(id){showAddItem(id);}

function saveItem(editId){
  const name = document.getElementById('m-name').value.trim();
  const price = Number(document.getElementById('m-price').value);
  const code = document.getElementById('m-code').value.trim();
  const err = document.getElementById('m-err');
  if(!name||!code){err.textContent='Name and code are required';SFX.error();return;}
  if(isNaN(price)||price<0){err.textContent='Invalid price';SFX.error();return;}
  const dup = items.find(i=>i.code.toLowerCase()===code.toLowerCase()&&i.id!==editId);
  if(dup){err.textContent='Code already in use by: '+dup.name;SFX.error();return;}
  if(editId){
    const idx=items.findIndex(i=>i.id===editId);
    if(idx>=0){items[idx]={...items[idx],name,price,code};}
    showToast('Item updated','success');
  } else {
    items.push({id:uid(),name,price,code,usage:0,lastUsed:null});
    showToast('Item added ✓','success');
  }
  SFX.save();
  saveItems(); closeModal(); renderContent();
}

function deleteItem(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Delete Item?</div>
    <p style="color:var(--gray-600);font-size:15px;margin-bottom:20px">"${item.name}" will be permanently removed.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="closeModal()" style="flex:1">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete('${id}')" style="flex:1">Delete</button>
    </div>`;
  openModal();
}
function confirmDelete(id){
  SFX.delete();
  items = items.filter(i=>i.id!==id);
  saveItems(); closeModal();
  showToast('Item deleted','delete');
  renderContent();
}

// ═══════════════════════════════════
//  HISTORY
// ═══════════════════════════════════
let histFilter = 'all';
let histSearch = '';
function renderHistory(){
  const now = Date.now();
  let list = [...purchases].sort((a,b)=>b.ts-a.ts);
  if(histSearch){const q=histSearch.toLowerCase(); list=list.filter(p=>p.itemName.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));}
  if(histFilter==='today') list=list.filter(p=>new Date(p.ts).toDateString()===new Date().toDateString());
  else if(histFilter==='week') list=list.filter(p=>now-p.ts<7*86400000);
  else if(histFilter==='month') list=list.filter(p=>monthKey(p.ts)===monthKey(now));
  const total = list.reduce((s,p)=>s+p.total,0);

  // Group by date
  const groups = groupPurchasesByDate(list);

  let groupedRows = '';
  if(groups.length===0){
    groupedRows = '<div class="empty">No records found</div>';
  } else {
    groupedRows = groups.map(g=>`
      <div class="date-group">
        <div class="date-group-header">
          <span>${fmtGroupLabel(g.purchases[0].ts)}</span>
          <span class="date-group-total">${fmtCurrency(g.total)}</span>
        </div>
        <div class="card" style="padding:0 16px;border-radius:0 0 var(--radius) var(--radius);box-shadow:none;margin-bottom:0">
          ${g.purchases.map(p=>`
            <div class="purch-row">
              <div class="purch-left">
                <div class="purch-name">${p.itemName}</div>
                <div class="purch-sub">${fmtTime(p.ts)} · <span class="badge" style="font-size:10px">${p.code}</span></div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="purch-right">
                  <div class="purch-total">${fmtCurrency(p.total)}</div>
                  <div class="purch-qty">×${p.qty}</div>
                </div>
                <button class="icon-btn icon-btn-red" onclick="deletePurchase('${p.id}')">${svg(ICONS.trash,15)}</button>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  return `
  <div class="search-wrap">
    ${svg(ICONS.search)}<input type="search" value="${histSearch}" placeholder="Search by name or code…" oninput="onHistSearch(this.value)" autocomplete="off"/>
  </div>
  <div class="filter-row">
    ${['all','today','week','month'].map((f,i)=>`<button class="filter-pill ${histFilter===f?'active':''}" onclick="setHistFilter('${f}')">${['All','Today','This Week','This Month'][i]}</button>`).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:12px;align-items:center">
    <span style="font-size:12px;color:var(--gray-400);font-weight:700">${list.length} records</span>
    <span style="font-size:14px;font-weight:800;color:var(--orange)">Total: ${fmtCurrency(total)}</span>
  </div>
  ${groupedRows}
  <div style="height:8px"></div>`;
}

function attachHistoryEvents(){}
function onHistSearch(v){histSearch=v;renderContent();}
function setHistFilter(f){histFilter=f;renderContent();}
function deletePurchase(id){
  SFX.delete();
  purchases = purchases.filter(p=>p.id!==id);
  savePurchases();
  showToast('Record deleted','delete');
  renderContent();
}

// ═══════════════════════════════════
//  ANALYTICS
// ═══════════════════════════════════
function setAnalyticsDateMode(mode){
  analyticsDateMode = mode;
  renderContent();
}
function setAnalyticsDate1(v){analyticsDate1=v;renderContent();}
function setAnalyticsDate2(v){analyticsDate2=v;renderContent();}

function renderAnalytics(){
  const now = Date.now();
  const today = purchases.filter(p=>new Date(p.ts).toDateString()===new Date().toDateString()).reduce((s,p)=>s+p.total,0);
  const month = purchases.filter(p=>monthKey(p.ts)===monthKey(now)).reduce((s,p)=>s+p.total,0);
  const all = purchases.reduce((s,p)=>s+p.total,0);

  // Date-filtered results
  const d1 = new Date(analyticsDate1); d1.setHours(0,0,0,0);
  const d2 = analyticsDateMode==='range' ? new Date(analyticsDate2) : new Date(analyticsDate1);
  d2.setHours(23,59,59,999);
  const filteredByDate = purchases.filter(p=>{const d=new Date(p.ts);return d>=d1&&d<=d2;}).sort((a,b)=>b.ts-a.ts);
  const dateFilterTotal = filteredByDate.reduce((s,p)=>s+p.total,0);

  const dateResultRows = filteredByDate.length===0
    ? '<div class="empty" style="padding:20px">No purchases in this period</div>'
    : filteredByDate.map(p=>`
      <div class="analytics-result-row">
        <div class="ar-dot"></div>
        <div class="ar-left">
          <div class="ar-name">${p.itemName}</div>
          <div class="ar-meta">${fmtDateTime(p.ts)} · <span style="font-family:monospace;font-weight:700;color:var(--orange)">${p.code}</span> · ×${p.qty}</div>
        </div>
        <div class="ar-amount">${fmtCurrency(p.total)}</div>
      </div>`).join('');

  const byMonth={};
  purchases.forEach(p=>{const k=monthKey(p.ts);byMonth[k]=(byMonth[k]||0)+p.total;});
  const months=Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  const maxM=Math.max(...months.map(([,v])=>v),1);
  const bars=months.map(([k,v])=>`
    <div class="bar-row">
      <div class="bar-label-row"><span class="bar-label">${k}</span><span class="bar-amount">${fmtCurrency(v)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxM*100)}%"></div></div>
    </div>`).join('');

  const byItem={};
  purchases.forEach(p=>{
    if(!byItem[p.itemName]) byItem[p.itemName]={name:p.itemName,code:p.code,total:0,count:0};
    byItem[p.itemName].total+=p.total; byItem[p.itemName].count+=p.qty;
  });
  const top=Object.values(byItem).sort((a,b)=>b.total-a.total).slice(0,8);
  const rankRows=top.map((it,i)=>`
    <div class="rank-row">
      <div class="rank-num" style="background:${i<3?'var(--orange)':'var(--gray-100)'};color:${i<3?'#fff':'var(--gray-600)'}">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.name}</div>
        <div style="font-size:11px;color:var(--gray-400)">Qty: ${it.count}</div>
      </div>
      <div class="price">${fmtCurrency(it.total)}</div>
    </div>`).join('');

  const date2input = analyticsDateMode==='range' ? `
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <div style="font-size:12px;font-weight:700;color:var(--gray-400);flex-shrink:0">TO</div>
      <input type="date" value="${analyticsDate2}" onchange="setAnalyticsDate2(this.value)" style="flex:1;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:14px;font-weight:600;background:var(--gray-50);color:var(--gray-900);outline:none;font-family:inherit;-webkit-appearance:none"/>
    </div>` : '';

  return `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    ${[['TODAY',today,'var(--orange)'],['MONTH',month,'var(--green)'],['ALL TIME',all,'var(--blue)']].map(([l,v,c])=>`
    <div class="stat-card" style="padding:12px 10px;text-align:center">
      <div class="stat-label">${l}</div>
      <div class="stat-val" style="font-size:15px;color:${c}">${fmtCurrency(v)}</div>
    </div>`).join('')}
  </div>

  <!-- Date Picker Section -->
  <div class="analytics-date-section">
    <div class="card-title" style="margin-bottom:10px">${svg(ICONS.calendar,15,'style="stroke:var(--orange)"')} DATE FILTER</div>
    <div class="date-range-toggle">
      <button class="date-range-btn ${analyticsDateMode==='single'?'active':''}" onclick="setAnalyticsDateMode('single')">Single Day</button>
      <button class="date-range-btn ${analyticsDateMode==='range'?'active':''}" onclick="setAnalyticsDateMode('range')">Date Range</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:12px;font-weight:700;color:var(--gray-400);flex-shrink:0">${analyticsDateMode==='range'?'FROM':''}</div>
      <input type="date" value="${analyticsDate1}" onchange="setAnalyticsDate1(this.value)" style="flex:1;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:14px;font-weight:600;background:var(--gray-50);color:var(--gray-900);outline:none;font-family:inherit;-webkit-appearance:none"/>
    </div>
    ${date2input}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)">
      <span style="font-size:13px;color:var(--gray-600);font-weight:700">${filteredByDate.length} records</span>
      <span style="font-size:15px;font-weight:900;color:var(--orange)">${fmtCurrency(dateFilterTotal)}</span>
    </div>
  </div>

  <!-- Date Filter Results -->
  ${filteredByDate.length>0||true ? `
  <div class="card" style="padding:0 16px">
    <div class="card-title" style="padding:16px 0 0">PURCHASES IN PERIOD</div>
    ${dateResultRows}
  </div>` : ''}

  ${months.length?`<div class="card"><div class="card-title">MONTHLY SPENDING</div>${bars}</div>`:''}
  ${top.length?`<div class="card"><div class="card-title">TOP PURCHASED ITEMS</div><div style="padding:0">${rankRows}</div></div>`:''}
  <div style="height:8px"></div>`;
}

// ═══════════════════════════════════
//  MODAL
// ═══════════════════════════════════
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay')&&e.target!==document.querySelector('.modal-bg')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this||e.target===this.querySelector('.modal-bg')) closeModal(e);
});

updateDate();
updateItemCount();
renderContent();

// Service Worker
if('serviceWorker' in navigator){
  const sw = `
    const CACHE='inv-v3';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['.']))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob2=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob2)).catch(()=>{});
}
